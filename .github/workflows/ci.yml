name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JavaScript lint and release checks ───────────────────────────────────────
  lint-js:
    name: Lint / ESLint & package checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check bundled templates are in sync
        run: |
          npm run sync-templates
          git diff --exit-code -- templates

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Check package contents
        run: npm pack --dry-run

  # ── CLI smoke tests ──────────────────────────────────────────────────────────
  test-cli:
    name: Test & Lint / CLI smoke tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]

    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm test

  # ── Markdown lint ────────────────────────────────────────────────────────────
  lint-markdown:
    name: Lint / Markdown
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README.md
            CONTRIBUTING.md
            .sdd/**/*.md
            cli/README.md

  # ── Shell script lint ────────────────────────────────────────────────────────
  lint-shell:
    name: Lint / shellcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: .sdd/scripts
          severity: warning

      - name: Check installer syntax
        run: bash -n install.sh .sdd/scripts/init.sh
